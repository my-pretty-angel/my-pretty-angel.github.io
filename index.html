<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to my aeri,</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">

    <style>
        /* Estilo Global */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff; /* Fondo blanco */
            font-family: 'Cedarville Cursive', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Mantiene la página limpia sin scroll */
        }

        .contenedor-principal {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: normal;
        }

        /* Estilo de la Imagen (casi todo el plano) */
        .imagen-principal {
            max-width: 90%;  /* Ocupa casi todo el ancho */
            max-height: 75vh; /* Ocupa casi todo el alto, respetando el espacio del texto */
            object-fit: contain;
            border-radius: 5px; /* Opcional: un toque suave en las esquinas */
        }

        /* Estilo de la Flecha en el costado derecho abajo */
        .flecha-siguiente {
            position: fixed;
            bottom: 30px;
            right: 40px;
            text-decoration: none;
            color: #333;
            transition: transform 0.3s ease, opacity 0.3s ease;
            display: flex;
            align-items: center;
        }

        .flecha-siguiente:hover {
            transform: translateX(8px); /* Animación al pasar el mouse */
            opacity: 0.6;
        }

        .icono-svg {
            width: 35px;
            height: 35px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <h1>to my aeri</h1>
        
        <img src="IMG_3514.PNG" alt="Imagen principal" class="imagen-principal">
    </div>

    <a href="siguiente.html" class="flecha-siguiente" title="Continuar">
        <svg class="icono-svg" viewBox="0 0 24 24">
            <path d="M12,4l-1.41,1.41L16.17,11H4v2h12.17l-5.58,5.59L12,20l8-8L12,4z"/>
        </svg>
    </a>

</body>
</html>
