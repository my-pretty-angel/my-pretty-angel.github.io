<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to my aeri,</title>
    
    <!-- Importación de la fuente desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #ffffff; /* Fondo blanco */
            font-family: 'Cedarville Cursive', cursive; /* Aplicar la fuente */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .contenedor {
            width: 90vw;
            height: 80vh; /* Deja espacio para el texto */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: normal;
        }
        
        /* Estilo de la Flecha en el costado derecho abajo */
        .flecha-siguiente {
            position: fixed;
            bottom: 30px;
            right: 40px;
            text-decoration: none;
            color: #333;
            transition: transform 0.3s ease, opacity 0.3s ease;
            display: flex;
            align-items: center;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px; /* Opcional: bordes redondeados suaves */
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>to my aeri,</h1>
        
        <!-- Reemplaza la URL por la de tu imagen -->
        <img src="IMG_3514.png" alt="letter">

        <a href="my-pretty-angel.github.io/1" class="flecha-siguiente" title="Continuar">
        <svg class="icono-svg" viewBox="0 0 24 24">
            <path d="M12,4l-1.41,1.41L16.17,11H4v2h12.17l-5.58,5.59L12,20l8-8L12,4z"/>
    </div>

</body>
</html>
