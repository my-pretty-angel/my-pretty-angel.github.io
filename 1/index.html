<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de GitHub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">

    <style>
        /* Estilo Global */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff; /* Fondo blanco */
            font-family: 'Cedarville Cursive', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Mantiene la página limpia sin scroll */
        }

        .contenedor-principal {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: normal;
        }

        /* Estilo de la Imagen (casi todo el plano) */
        .imagen-principal {
            max-width: 90%;  /* Ocupa casi todo el ancho */
            max-height: 75vh; /* Ocupa casi todo el alto, respetando el espacio del texto */
            object-fit: contain;
            border-radius: 5px; /* Opcional: un toque suave en las esquinas */
        }

        /* Estilo de la Flecha en el costado derecho abajo */
        .flecha-siguiente {
            position: fixed;
            bottom: 30px;
            right: 40px;
            text-decoration: none;
            color: #333;
            transition: transform 0.3s ease, opacity 0.3s ease;
