<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Personalizado - GitHub</title>
    
    <!-- Importación de la fuente Cedarville Cursive -->
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">

    <style>
        /* Reset y Estilo Global */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff; /* Fondo blanco */
            font-family: 'Cedarville Cursive', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Evita que aparezcan barras de desplazamiento */
        }

        .contenedor-principal {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.8rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: normal;
        }

        /* Estilo del Video */
        video {
            width: 95%;      /* Ocupa casi todo el ancho disponible */
            max-width: 1100px; /* Límite para que no se vea gigante en monitores pro */
            height: auto;
            max-height: 75vh;  /* Limita la altura para que no empuje el texto fuera */
            border-radius: 12px;
            /* Opcional: añade una sombra muy sutil para que resalte sobre el blanco */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            outline: none;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <h1>Un momento para recordar</h1>
        
        <!-- Reemplaza "tu-video.mp4" por el nombre de tu archivo en GitHub -->
        <video controls autoplay muted loop>
            <source src="tu-video.mp4" type="video/mp4">
            Tu navegador no soporta el formato de video.
        </video>
    </div>

</body>
</html>
