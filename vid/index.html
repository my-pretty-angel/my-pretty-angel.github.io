
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to my aeri,</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff; /* Fondo blanco */
            font-family: 'Cedarville Cursive', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .contenedor-principal {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: normal;
        }

        /* Contenedor responsivo para el video de Drive */
        .video-wrapper {
            width: 90%;
            max-width: 1000px;
            height: 70vh; /* Ocupa casi todo el alto */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* La Flecha en el costado derecho abajo */
        .flecha-siguiente {
            position: fixed;
            bottom: 30px;
            right: 40px;
            text-decoration: none;
            color: #333;
            transition: transform 0.3s ease;
        }

        .flecha-siguiente:hover {
            transform: translateX(8px);
        }

        .icono-svg {
            width: 35px;
            height: 35px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <h1></h1>
        
        <div class="video-wrapper">
            <iframe src="https://drive.google.com/file/d/1XDRzdS2X4BtXKt6pF1Bo5FU8hGEG1f2x/preview" allow="autoplay"></iframe>
        </div>
    </div>

    <a href="siguiente.html" class="flecha-siguiente">
        <svg class="icono-svg" viewBox="0 0 24 24">
            <path d="M12,4l-1.41,1.41L16.17,11H4v2h12.17l-5.58,5.59L12,20l8-8L12,4z"/>
        </svg>
    </a>

</body>
</html>

</body>
</html>
