
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to my aeri,</title>
    
    <!-- Importación de la fuente Cedarville Cursive -->
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">

    <style>
        /* Estilo Global */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff; /* Fondo blanco */
            font-family: 'Cedarville Cursive', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .contenedor-principal {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.8rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: normal;
        }

        /* Estilo del Video */
        video {
            width: 95%;
            max-width: 1100px;
            height: auto;
            max-height: 75vh;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            outline: none;
        }

        /* La Flecha en el costado derecho abajo */
        .flecha-siguiente {
            position: fixed;
            bottom: 30px;
            right: 40px;
            text-decoration: none;
            color: #333;
            font-size: 2rem;
            transition: transform 0.3s ease, opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flecha-siguiente:hover {
            transform: translateX(10px); /* Se mueve un poco a la derecha al pasar el mouse */
            opacity: 0.7;
        }

        /* Estilo visual de la flecha (SVG para que sea nítida) */
        .icono-flecha {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <h1></h1>
        
        <!-- Reemplaza "tu-video.mp4" por el nombre de tu archivo -->
        <video controls autoplay muted loop>
            <source src="tu-video.mp4" type="video/mp4">
            Tu navegador no soporta el formato de video.
        </video>
    </div>

    <!-- BOTÓN DE FLECHA: Reemplaza "siguiente.html" por el link de tu otra página -->
    <a href="siguiente.html" class="flecha-siguiente" title="Siguiente">
        <svg class="icono-flecha" viewBox="0 0 24 24">
            <path d="M12,4l-1.41,1.41L16.17,11H4v2h12.17l-5.58,5.59L12,20l8-8L12,4z"/>
        </svg>
    </a>

</body>
</html>
